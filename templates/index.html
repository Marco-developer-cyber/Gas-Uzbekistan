{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UzGasFind - Find Gas Stations in Uzbekistan</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <!-- Leaflet Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}?v=20260309f">
</head>

<body>
    <div class="app-container">
        <!-- Top Navigation -->
        <header class="topbar">
            <div class="logo">
                <span class="logo-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M7 3h8a2 2 0 0 1 2 2v14H5V5a2 2 0 0 1 2-2z"></path>
                        <path d="M9 7h6"></path>
                        <path d="M9 10h6"></path>
                        <path d="M17 8h2l2 2v7a2 2 0 0 1-2 2h-2"></path>
                    </svg>
                </span>
                <h1>UzGasFind</h1>
            </div>

            <div class="search-filters">
                <div class="search-box">
                    <span class="search-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24">
                            <circle cx="11" cy="11" r="7"></circle>
                            <path d="M20 20l-3.5-3.5"></path>
                        </svg>
                    </span>
                    <input type="text" id="searchInput" placeholder="Search city or region in Uzbekistan...">
                </div>

                <select id="regionFilter" class="filter-dropdown">
                    <option value="">Region</option>
                    {% for region in regions %}
                    <option value="{{ region }}">{{ region }}</option>
                    {% endfor %}
                </select>

                <select id="fuelFilter" class="filter-dropdown">
                    <option value="">Fuel Type</option>
                    <option value="PETROL AI-80">AI-80</option>
                    <option value="PETROL AI-92">AI-92</option>
                    <option value="PETROL AI-95">AI-95</option>
                    <option value="PETROL AI-98">AI-98</option>
                    <option value="DIESEL">Diesel</option>
                    <option value="CNG">CNG</option>
                    <option value="LPG">LPG</option>
                </select>
            </div>

            <div class="top-actions">
                <button id="locateMeBtn" class="btn-primary">
                    <span class="icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 3v3"></path>
                            <path d="M12 18v3"></path>
                            <path d="M3 12h3"></path>
                            <path d="M18 12h3"></path>
                            <circle cx="12" cy="12" r="4"></circle>
                        </svg>
                    </span>
                    Find Nearby
                </button>
                <div class="user-profile"></div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>Nearby Stations</h2>
                    <span id="stationCount" class="station-count">0 STATIONS FOUND</span>
                </div>

                <div class="filter-pills">
                    <button class="pill active" data-filter="all">All</button>
                    <button class="pill" data-filter="open">Open Now</button>
                    <button class="pill" data-filter="favorites">Favorites</button>
                </div>

                <div id="stationList" class="station-list">
                    <!-- Cards will be dynamically injected here -->
                    <div class="loading-state">Loading stations...</div>
                </div>
            </aside>

            <!-- Map Area -->
            <div class="map-container">
                <div id="map"></div>
                <!-- Closest Station Card Overlay (hidden by default) -->
                <div id="closestStationCard" class="overlay-card hidden">
                    <button id="closeOverlayBtn" class="overlay-close-btn" type="button" aria-label="Close details">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M6 6l12 12"></path>
                            <path d="M18 6l-12 12"></path>
                        </svg>
                    </button>
                    <div class="overlay-content">
                        <div id="overlayImgContainer" class="overlay-img"></div>
                        <div class="overlay-info">
                            <span class="badge-closest">SELECTED STATION</span>
                            <h3 id="closestName">Station Name</h3>
                            <div id="closestDesc" class="overlay-description"></div>
                            <div id="closestTime" class="overlay-time"></div>
                            <div class="overlay-prices"></div>
                        </div>
                    </div>
                </div>
                <button id="openOverlayBtn" class="overlay-open-btn" type="button" hidden>
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="9"></circle>
                        <path d="M12 10v6"></path>
                        <path d="M12 7h.01"></path>
                    </svg>
                    Details
                </button>
            </div>
        </main>

        <nav class="mobile-bottom-nav" aria-label="Mobile navigation">
            <button id="mobileMapBtn" class="mobile-nav-btn active" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 6l6-2 6 2 6-2v14l-6 2-6-2-6 2z"></path>
                    <path d="M9 4v14"></path>
                    <path d="M15 6v14"></path>
                </svg>
                <span>Map</span>
            </button>
            <button id="mobileSearchBtn" class="mobile-nav-btn" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="M20 20l-3.5-3.5"></path>
                </svg>
                <span>Search</span>
            </button>
        </nav>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- Leaflet Routing Machine JS -->
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <!-- Custom JS -->
    <script src="{% static 'js/map.js' %}?v=20260309f"></script>
</body>

</html>
